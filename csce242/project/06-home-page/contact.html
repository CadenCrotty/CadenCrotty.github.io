<!DOCTYPE html>
<html>
  <head>
    <title>Country</title>
    <link rel="stylesheet" href="pages.css">
  </head>

  <body>
    <div id="main-content">
      <header id="main-header">
        <h1>TopTracks</h1>

        <nav>
          <ul class="tabs">
            <li><a href="index.html">Home</a></li>
            <li><a href="rock.html">Rock</a></li>
            <li><a href="country.html">Country</a></li>
            <li><a href="jazz.html">Jazz</a></li>
            <li><a href="soul.html">Soul</a></li>
            <li><a href="reggae.html">Reggae</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </header>

      <!-- MAIN must be OUTSIDE the header so it sits under the nav -->
      <main id="content" class="contact columns">
        <section id="contact-us">
          <h3>Contact Us</h3>
          <p>We would love to here from you! Give us feedback here!</p>

          <form id="contact-form" method="POST">
            <input type="hidden" name="access_key" value="503a0f5e-15ad-419b-a536-96c12fbe8296">

            <p>
              <label for="name">Name:</label>
              <input type="text" name="name" id="name" required>
            </p>
            <p>
              <label for="email">Email</label>
              <input type="email" name="email" id="email" required>
            </p>

            <p>
              <label for="message">Message</label>
              <textarea name="message" id="message" required></textarea>
            </p>

            <p><button type="submit">Submit Form</button></p>

            <div id="contact-result"></div>
          </form>
        </section>

        <section class="one">
          <h3>Our Location</h3>
          <p>123 Anywhere St.</p>
